services:
  - type: web
    name: asset-tracker-backend
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: asset-tracker-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com

databases:
  - name: asset-tracker-db
    plan: free
